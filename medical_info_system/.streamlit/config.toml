[server]
port = ${PORT:8501}
headless = true
enableCORS = false
enableXsrfProtection = false
address = "0.0.0.0"
maxUploadSize = 200
fileWatcherType = "none"

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[logger]
level = "warning"

[global]
developmentMode = false

[theme]
base = "light"
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#31333f"
font = "sans serif"
