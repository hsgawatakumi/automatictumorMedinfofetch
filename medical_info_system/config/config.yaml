clinical_trials_gov:
  api_url: https://clinicaltrials.gov/api/v2/studies
  max_results_per_request: 100
  status_filter:
  - Recruiting
  - Active, not recruiting
  study_type: Interventional
conferences:
  aacr:
    date_range: April
    name: AACR Annual Meeting
    url: https://www.aacr.org/meeting-archive
  asco:
    date_range: May-June
    name: ASCO Annual Meeting
    url: https://meetinglibrary.asco.org
  esmo:
    date_range: September-October
    name: ESMO Annual Meeting
    url: https://www.esmo.org/meeting-library
fda:
  api_url: https://api.fda.gov/drug/drugsfda.json
  cancer_keywords:
  - cancer
  - tumor
  - neoplasm
  - malignancy
  - carcinoma
  - melanoma
  - leukemia
  - lymphoma
  - sarcoma
  label_url: https://api.fda.gov/drug/label.json
  max_results_per_request: 100
  start_date: '2020-01-01'
logging:
  backup_count: 5
  file_path: data/logs/system.log
  level: INFO
  max_file_size: 10485760
proxy:
  max_retries: 3
  proxy_list: []
  request_delay_max: 5
  request_delay_min: 3
  retry_delay_base: 2
  use_proxy: true
pubmed:
  api_key: ''
  base_url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
  max_results_per_query: 100
  request_delay: 0.5
scheduler:
  academic_papers: 0 1 * * 1
  cde_special: 0 5 * * *
  clinical_trials: 0 1 * * 2
  conference_abstracts: 0 6 * * *
  crossref: 0 1 * * 1
  fda_approved: 0 2 * * *
  fda_nda: 0 3 * * *
  nmpa_approved: 0 4 * * *
crossref:
  mailto: research@medical-info.com
  max_results: 100
  request_delay: 1.0
  user_agent: MedicalInfoCollector/1.0
storage:
  database_path: data/medical_info.db
  exports_path: data/exports/
  labels_path: data/labels/
  logs_path: data/logs/
system:
  auto_start: true
  backup_enabled: true
  backup_interval_hours: 24
  notification_enabled: true
